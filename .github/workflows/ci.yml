name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: extractions/setup-just@v2

      - name: Install dependencies
        env:
          SKIP_NAPI_BUILD: '1'
          SKIP_WDA_BUILD: '1'
        run: bun install

      - name: Lint
        run: bunx oxlint --import-plugin --tsconfig ./tsconfig.json .

      - name: Format check
        run: bunx oxfmt --check .

      - name: Typecheck web
        run: cd apps/web && bunx tsc --noEmit
