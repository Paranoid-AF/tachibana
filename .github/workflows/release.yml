name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # On tag push: strip leading 'v' (e.g. v1.2.3 → 1.2.3).
  # On workflow_dispatch: use 0.0.0-dev so packages remain installable.
  RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}

permissions:
  contents: write

jobs:
  # ─── Stage 1: Build WDA IPA on macOS (requires Xcode) ──────────────
  build-wda:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        env:
          SKIP_NAPI_BUILD: '1'
          SKIP_WDA_BUILD: '1'
        run: bun install

      - name: Build WebDriverAgent IPA
        run: bun run packages/ios-wda/scripts/postinstall.ts

      - name: Upload WDA IPA
        uses: actions/upload-artifact@v7
        with:
          name: wda-ipa
          path: packages/ios-wda/ipa-build/WebDriverAgentRunner.ipa
          retention-days: 7

  # ─── Stage 2: Build server per platform ─────────────────────────────
  build:
    needs: build-wda
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            runner: macos-15
            rust-target: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
            ext: ''
          - label: darwin-x64
            runner: macos-13
            rust-target: x86_64-apple-darwin
            bun-target: bun-darwin-x64
            ext: ''
          - label: linux-x64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bun-target: bun-linux-x64
            ext: ''
          - label: linux-arm64
            runner: ubuntu-22.04
            rust-target: aarch64-unknown-linux-gnu
            bun-target: bun-linux-arm64
            ext: ''
          - label: windows-x64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bun-target: bun-windows-x64
            ext: '.exe'

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/ios-connect/target/
          key: cargo-${{ matrix.label }}-${{ hashFiles('packages/ios-connect/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.label }}-

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.label, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.label == 'linux-arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install dependencies
        env:
          SKIP_NAPI_BUILD: '1'
          SKIP_WDA_BUILD: '1'
        run: bun install

      - name: Build NAPI addon
        shell: bash
        env:
          CC: ${{ matrix.label == 'linux-arm64' && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.label == 'linux-arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          bunx @napi-rs/cli build \
            --platform --release \
            --target ${{ matrix.rust-target }} \
            --manifest-path packages/ios-connect/Cargo.toml \
            --output-dir packages/ios-connect/dist

      - name: Build web frontend
        run: cd apps/web && bunx vite build

      - name: Build server binary
        shell: bash
        run: |
          mkdir -p apps/server/dist
          ext="${{ matrix.ext }}"
          bun build --compile \
            --target ${{ matrix.bun-target }} \
            apps/server/src/index.ts \
            --outfile "apps/server/dist/tachibana-server${ext}" \
            --external vite \
            --define 'process.env.NODE_ENV="production"'

      - name: Download go-ios and DDI
        run: bun run apps/server/scripts/install-go-ios.ts

      - name: Download WDA IPA
        if: startsWith(matrix.label, 'darwin')
        uses: actions/download-artifact@v8
        with:
          name: wda-ipa
          path: packages/ios-wda/ipa-build/

      - name: Assemble staging directory
        shell: bash
        run: |
          set -e
          label="${{ matrix.label }}"
          ext="${{ matrix.ext }}"
          staging="staging/tachibana-${label}"
          mkdir -p "${staging}/bin" "${staging}/drizzle" "${staging}/web"

          # Server binary
          cp "apps/server/dist/tachibana-server${ext}" "${staging}/"

          # go-ios binary + DDI
          cp -r apps/server/bin/* "${staging}/bin/"

          # Drizzle migrations
          cp -r apps/server/drizzle/* "${staging}/drizzle/"

          # Web frontend
          cp -r apps/web/dist/* "${staging}/web/"

          # WDA IPA (macOS only)
          if [[ "$label" == darwin-* ]]; then
            mkdir -p "${staging}/assets"
            ipa="packages/ios-wda/ipa-build/WebDriverAgentRunner.ipa"
            [ -f "$ipa" ] && cp "$ipa" "${staging}/assets/"
          fi

          # Fix permissions on non-Windows
          if [ "${{ matrix.ext }}" = "" ]; then
            chmod +x "${staging}/tachibana-server" "${staging}/bin/ios" 2>/dev/null || true
          fi

      - name: Create archive
        shell: bash
        run: |
          set -e
          label="${{ matrix.label }}"
          if [[ "$label" == windows-* ]]; then
            (cd staging && 7z a -tzip "../tachibana-${label}.zip" "tachibana-${label}/")
          else
            tar czf "tachibana-${label}.tar.gz" -C staging "tachibana-${label}"
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.label }}
          path: tachibana-${{ matrix.label }}.${{ startsWith(matrix.label, 'windows') && 'zip' || 'tar.gz' }}
          retention-days: 7

      - name: Upload staging artifact (Linux + Windows only)
        if: startsWith(matrix.label, 'linux') || startsWith(matrix.label, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: staging-${{ matrix.label }}
          path: staging/tachibana-${{ matrix.label }}/
          retention-days: 7

  # ─── Stage 3a: Build .deb packages ──────────────────────────────────
  package-deb:
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - label: linux-x64
            arch: amd64
          - label: linux-arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Download staging
        uses: actions/download-artifact@v8
        with:
          name: staging-${{ matrix.label }}
          path: staging/

      - name: Build .deb
        shell: bash
        run: |
          set -e
          VERSION="${RELEASE_VERSION#v}"
          PKG="tachibana_${VERSION}_${{ matrix.arch }}"
          ROOT="build-deb/${PKG}"

          # Create deb directory structure
          mkdir -p "${ROOT}/DEBIAN"
          mkdir -p "${ROOT}/opt/tachibana"
          mkdir -p "${ROOT}/etc/systemd/system"

          # Copy application files
          cp -r staging/* "${ROOT}/opt/tachibana/"

          # Copy systemd service
          cp packaging/systemd/tachibana-server.service "${ROOT}/etc/systemd/system/"

          # Generate control file
          sed -e "s/{{VERSION}}/${VERSION}/" \
              -e "s/{{ARCH}}/${{ matrix.arch }}/" \
              packaging/deb/control.template > "${ROOT}/DEBIAN/control"

          # Copy maintainer scripts
          cp packaging/deb/postinst "${ROOT}/DEBIAN/"
          cp packaging/deb/prerm "${ROOT}/DEBIAN/"
          chmod 755 "${ROOT}/DEBIAN/postinst" "${ROOT}/DEBIAN/prerm"

          # Build deb
          dpkg-deb --build "${ROOT}"
          mv "build-deb/${PKG}.deb" .

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.label }}
          path: '*.deb'
          retention-days: 7

  # ─── Stage 3b: Build .rpm packages ─────────────────────────────────
  package-rpm:
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - label: linux-x64
            arch: x86_64
          - label: linux-arm64
            arch: aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download staging
        uses: actions/download-artifact@v8
        with:
          name: staging-${{ matrix.label }}
          path: staging/

      - name: Build .rpm
        shell: bash
        run: |
          set -e
          VERSION="${RELEASE_VERSION#v}"

          # Set up rpmbuild tree
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}

          # Copy staging files and systemd unit into SOURCES
          cp -r staging ~/rpmbuild/SOURCES/staging
          cp packaging/systemd/tachibana-server.service ~/rpmbuild/SOURCES/

          # Build RPM
          rpmbuild -bb \
            --define "_version ${VERSION}" \
            --define "_arch ${{ matrix.arch }}" \
            --target ${{ matrix.arch }} \
            packaging/rpm/tachibana-server.spec

          # Copy output
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;

      - name: Upload .rpm
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.label }}
          path: '*.rpm'
          retention-days: 7

  # ─── Stage 3c: Build MSI installer ─────────────────────────────────
  package-msi:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download staging
        uses: actions/download-artifact@v8
        with:
          name: staging-windows-x64
          path: staging/

      - name: Install WiX v4
        run: dotnet tool install --global wix

      - name: Harvest files and build MSI
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_VERSION }}".TrimStart('v')
          $stagingDir = "staging"

          # Harvest additional files (bin/, drizzle/, web/) into a fragment
          wix heat dir "$stagingDir\bin" -cg HeatFiles -dr BinFolder `
            -var "var.StagingDir\bin" -ag -sfrag -srd `
            -out heat-bin.wxs

          wix heat dir "$stagingDir\drizzle" -cg HeatDrizzle -dr DrizzleFolder `
            -var "var.StagingDir\drizzle" -ag -sfrag -srd `
            -out heat-drizzle.wxs

          wix heat dir "$stagingDir\web" -cg HeatWeb -dr WebFolder `
            -var "var.StagingDir\web" -ag -sfrag -srd `
            -out heat-web.wxs

          # Build MSI
          wix build packaging/wix/main.wxs heat-bin.wxs heat-drizzle.wxs heat-web.wxs `
            -d ProductVersion="$version" `
            -d "StagingDir=$stagingDir" `
            -arch x64 `
            -out "tachibana-windows-x64.msi"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: msi
          path: '*.msi'
          retention-days: 7

  # ─── Stage 4: Create GitHub Release ─────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, package-deb, package-rpm, package-msi]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all dist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: artifacts/

      - name: Download deb artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: deb-*
          merge-multiple: true
          path: artifacts/

      - name: Download rpm artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rpm-*
          merge-multiple: true
          path: artifacts/

      - name: Download MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: msi
          path: artifacts/

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS (Homebrew)
            ```bash
            brew tap Paranoid-AF/tap
            brew install tachibana
            brew services start tachibana
            ```

            ### macOS (manual)
            macOS may block the binaries because they are not code-signed. To fix this:
            ```bash
            xattr -cr /path/to/tachibana-darwin-*/
            ```

            ### Linux (deb)
            ```bash
            sudo dpkg -i tachibana_*.deb
            sudo systemctl start tachibana-server
            ```

            ### Linux (rpm)
            ```bash
            sudo rpm -i tachibana-*.rpm
            sudo systemctl start tachibana-server
            ```

            ### Windows
            Run the MSI installer, or use the portable zip. The MSI installer registers Tachibana as a Windows service.
          files: artifacts/*

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          VERSION="${RELEASE_VERSION#v}"

          SHA_ARM64=$(sha256sum "artifacts/tachibana-darwin-arm64.tar.gz" | awk '{print $1}')
          SHA_X64=$(sha256sum "artifacts/tachibana-darwin-x64.tar.gz" | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Paranoid-AF/homebrew-tap.git" tap-repo
          cd tap-repo

          sed -e "s/{{VERSION}}/${VERSION}/g" \
              -e "s/{{SHA256_DARWIN_ARM64}}/${SHA_ARM64}/" \
              -e "s/{{SHA256_DARWIN_X64}}/${SHA_X64}/" \
              ../packaging/homebrew/tachibana.rb.template > Formula/tachibana.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tachibana.rb
          git commit -m "tachibana ${VERSION}"
          git push
