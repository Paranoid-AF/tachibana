[package]
name = "kani-isideload"
version = "0.1.0"
edition = "2021"

[lib]
name = "kani_isideload"
crate-type = ["cdylib"]

[dependencies]
isideload = { git = "https://github.com/nab138/isideload.git", features = [
  "install",
  "fs-storage",
] }
idevice = { version = "0.1.52", features = ["usbmuxd", "screenshotr", "afc", "pair"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
napi = { version = "2", features = ["async", "tokio_rt", "napi4", "serde-json"] }
napi-derive = { version = "2" }

[build-dependencies]
napi-build = "2"

# isideload depends on pre-release RustCrypto crates that are sensitive to
# patch version bumps. Pin to exact versions known to work (from iloader).
# zip v7.4.0 was yanked from crates.io; use git source.
[patch.crates-io]
zip = { git = "https://github.com/zip-rs/zip2.git", tag = "v7.4.0" }
